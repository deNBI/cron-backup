name: Publish Docker
on: 
  workflow_dispatch:
  pull_request:
  push:
    branches: 
      - 'main'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Workflow run cleanup action
        uses: rokroskar/workflow-run-cleanup-action@v0.3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@master
      - name: Extract branch name
        shell: bash
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
        id: extract_branch

      - name: Set tag
        run: sed 's/\//-/g'  <<< "::set-output name=TAG::${{ steps.extract_branch.outputs.branch }}"
        id: tag
      - name: Get tag
        run: echo "The selected tag is ${{ steps.tag.outputs.TAG }}"
        
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to de.NBI OCI
        uses: docker/login-action@v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_DENBI_USERNAME }}
          password: ${{ secrets.OCI_DENBI_TOKEN }}
      - name: Build and publish image to de.NBI OCI
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          push: true
          tags: oci.bi.denbi.de/denbicloud/cron-backup:${{ steps.tag.outputs.TAG }}

  special_builds:
      runs-on: ubuntu-latest
      needs: build
      strategy:
        fail-fast: false
        matrix:
          type: [ postgresql, mysql, mongodb ]
      steps:

        - name: Workflow run cleanup action
          uses: rokroskar/workflow-run-cleanup-action@v0.3.3
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        - uses: actions/checkout@master
        - name: Extract branch name
          shell: bash
          run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
          id: extract_branch

        - name: Set tag
          run: sed 's/\//-/g'  <<< "::set-output name=TAG::${{ steps.extract_branch.outputs.branch }}"
          id: tag
        - name: Get tag
          run: echo "The selected tag is ${{ steps.tag.outputs.TAG }}"

        -
          name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v4
        - name: Login to de.NBI OCI
          uses: docker/login-action@v4
          with:
            registry: oci.bi.denbi.de
            username: ${{ secrets.OCI_DENBI_USERNAME }}
            password: ${{ secrets.OCI_DENBI_TOKEN }}
        - name: Build and publish image to de.NBI OCI
          uses: docker/build-push-action@v7
          env:
            BASE_TAG: ${{ steps.tag.outputs.TAG }}
          with:
            file: ${{matrix.type}}/Dockerfile
            context: ${{matrix.type}}
            push: true
            build-args: BASE_TAG
            tags: oci.bi.denbi.de/denbicloud/cron-backup:${{matrix.type}}-${{ steps.tag.outputs.TAG }}
