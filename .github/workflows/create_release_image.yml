name: Create Release Image
on:
  release:
    types: [ published,edited,created ]
  push:
    tags:
      - '*'
jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
      - uses: actions/checkout@61b9e3751b92087fd0b06925ba6dd6314e06f089 # master
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Login to de.NBI OCI
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_DENBI_USERNAME }}
          password: ${{ secrets.OCI_DENBI_TOKEN }}
      - name: Build and publish image to de.NBI OCI
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          file: Dockerfile
          push: true
          load: true
          tags: oci.bi.denbi.de/denbicloud/cron-backup:${{ steps.get_version.outputs.VERSION }}, oci.bi.denbi.de/denbicloud/cron-backup:latest

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: oci.bi.denbi.de/denbicloud/cron-backup:${{ steps.get_version.outputs.VERSION }}
          format: spdx-json
          output-file: cron-backup:${{ steps.get_version.outputs.VERSION }}-sbom.spdx.json     
  special_builds:
    runs-on: ubuntu-latest
    needs: build_release
    strategy:
      fail-fast: false
      matrix:
        type: [ postgresql, mysql, mongodb ]
    steps:

      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
      - uses: actions/checkout@61b9e3751b92087fd0b06925ba6dd6314e06f089 # master
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Login to oci.bi.denbi.de
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_DENBI_USERNAME }}
          password: ${{ secrets.OCI_DENBI_TOKEN }}
      - name: Build and publish image to de.NBI OCI
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        env:
          BASE_TAG: ${{ steps.get_version.outputs.VERSION }}
        with:
          file: ${{matrix.type}}/Dockerfile
          context: ${{matrix.type}}
          push: true
          load: true
          build-args: BASE_TAG
          tags: oci.bi.denbi.de/denbicloud/cron-backup:${{matrix.type}}-${{ steps.get_version.outputs.VERSION }}


      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: oci.bi.denbi.de/denbicloud/cron-backup:${{matrix.type}}-${{ steps.get_version.outputs.VERSION }}
          format: spdx-json
          output-file: cron-backup:${{matrix.type}}-${{ steps.get_version.outputs.VERSION }}-sbom.spdx.json   
