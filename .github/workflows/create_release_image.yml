name: Create Release Image
on:
  release:
    types: [ published,edited,created ]
  push:
    tags:
      - '*'
jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
      - uses: actions/checkout@master
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to de.NBI OCI
        uses: docker/login-action@v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_DENBI_USERNAME }}
          password: ${{ secrets.OCI_DENBI_TOKEN }}
      - name: Build and publish image to de.NBI OCI
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          push: true
          tags: oci.bi.denbi.de/denbicloud/cron-backup:${{ steps.get_version.outputs.VERSION }}, oci.bi.denbi.de/denbicloud/cron-backup:latest


  special_builds:
    runs-on: ubuntu-latest
    needs: build_release
    strategy:
      fail-fast: false
      matrix:
        type: [ postgresql, mysql, mongodb ]
    steps:

      - name: Get the version
        id: get_version
        run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
      - uses: actions/checkout@master
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to oci.bi.denbi.de
        uses: docker/login-action@v4
        with:
          registry: oci.bi.denbi.de
          username: ${{ secrets.OCI_DENBI_USERNAME }}
          password: ${{ secrets.OCI_DENBI_TOKEN }}
      - name: Build and publish image to de.NBI OCI
        uses: docker/build-push-action@v7
        env:
          BASE_TAG: ${{ steps.get_version.outputs.VERSION }}
        with:
          file: ${{matrix.type}}/Dockerfile
          context: ${{matrix.type}}
          push: true
          build-args: BASE_TAG
          tags: oci.bi.denbi.de/denbicloud/cron-backup:${{matrix.type}}-${{ steps.get_version.outputs.VERSION }}



